{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PrestApp | Editar Cliente</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" type="image/x-icon" href="{% static 'img/favicon.ico' %}">
    <link rel="icon" type="image/png" href="{% static 'img/favicon.ico' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<nav class="top-nav">
    <a href="{% url 'dashboard_supervisor' %}?ruta={{ targeta.ruta.id }}" class="nav-back">
        <i class="bi bi-arrow-left"></i> Volver
    </a>
    <span class="nav-title">Editar Cliente</span>
</nav>

<div style="max-width: 800px; margin: 0 auto; padding: 20px;">

    <div class="card card-form">
        <div class="card-inner-form">
            <form method="post">
                {% csrf_token %}

                <span class="form-section-label">Asignación</span>
                <div class="mb-4">
                    <label class="form-label">Ruta de cobro</label>
                    <select name="ruta" class="form-select" required>
                        {% for r in rutas %}
                        <option value="{{ r.id }}" {% if targeta.ruta.id == r.id %}selected{% endif %}>
                            📍 {{ r.nombre }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <span class="form-section-label">Datos Personales</span>
                <div class="row g-3 mb-4">
                    <div class="col-md-5">
                        <label class="form-label">Tipo documento</label>
                        <select name="tipo_identificacion" class="form-select" required>
                            <option value="CC" {% if targeta.tipo_identificacion == 'CC' %}selected{% endif %}>Cédula de Ciudadanía</option>
                            <option value="CE" {% if targeta.tipo_identificacion == 'CE' %}selected{% endif %}>Cédula de Extranjería</option>
                            <option value="TI" {% if targeta.tipo_identificacion == 'TI' %}selected{% endif %}>Tarjeta de Identidad</option>
                        </select>
                    </div>
                    <div class="col-md-7">
                        <label class="form-label">Número de documento</label>
                        <input type="text" name="numero_identificacion" class="form-control"
                            placeholder="Ej: 10203040" value="{{ targeta.numero_identificacion }}" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Nombre completo del cliente</label>
                        <input type="text" name="nombre_cliente" class="form-control"
                            placeholder="Nombre y Apellidos" value="{{ targeta.nombre_cliente }}" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Teléfono de contacto</label>
                        <input type="text" name="telefono" class="form-control"
                            placeholder="Ej: 3001234567" value="{{ targeta.telefono }}" required>
                    </div>
                </div>

                <span class="form-section-label">Ubicación y Domicilio</span>
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label">Dirección de residencia (Manual)</label>
                        <input type="text" name="direccion_casa" class="form-control"
                            placeholder="Calle, Carrera, Barrio..." value="{{ targeta.direccion_casa|default:'' }}">

                        <div class="mt-3">
                            <label class="form-label">Dirección del negocio (Opcional)</label>
                            <input type="text" name="direccion_negocio" class="form-control"
                                value="{{ targeta.direccion_negocio|default:'' }}">
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Punto GPS Exacto</label>
                        <div class="gps-container">
                            {% if targeta.latitud %}
                                <div id="mini-map"></div>
                                <a href="{{ targeta.url_google_maps }}" target="_blank" class="btn-maps-external">
                                    <i class="bi bi-google"></i> Ver en Google Maps
                                </a>
                            {% else %}
                                <div class="no-gps-state">
                                    <i class="bi bi-geo-alt text-warning" style="font-size: 1.5rem;"></i>
                                    <p class="small text-muted mb-0 mt-1">Sin coordenadas GPS.</p>
                                    <a href="https://wa.me/{{ targeta.telefono }}?text=Hola%20{{ targeta.nombre_cliente|urlencode }},%20por%20favor%20confirma%20tu%20ubicación%20haciendo%20clic%20aquí:%20http://{{ request.get_host }}/validar/{{ targeta.id }}/"
                                       target="_blank" class="btn-whatsapp-request">
                                        <i class="bi bi-whatsapp"></i> Solicitar Ubicación
                                    </a>
                                </div>
                            {% endif %}
                        </div>
                    </div>
                </div>

                <div class="mb-2">
                    <label class="form-label">Observaciones adicionales</label>
                    <textarea name="observaciones" class="form-control" rows="3"
                        placeholder="Notas sobre el cobro o el cliente...">{{ targeta.observaciones }}</textarea>
                </div>

                <div class="action-btns-wrap">
                    <a href="{% url 'dashboard_supervisor' %}?ruta={{ targeta.ruta.id }}" class="btn-cancel">
                        Cancelar
                    </a>
                    <button type="submit" class="btn-save-changes">
                        <i class="bi bi-check-circle-fill"></i> Guardar Cambios
                    </button>
                </div>

            </form>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    {% if targeta.latitud and targeta.longitud %}
    document.addEventListener('DOMContentLoaded', function () {
        var lat = {{ targeta.latitud|stringformat:"f" }};
        var lng = {{ targeta.longitud|stringformat:"f" }};

        var map = L.map('mini-map', {
            zoomControl: false,
            attributionControl: false
        }).setView([lat, lng], 16);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
        L.marker([lat, lng]).addTo(map);
    });
    {% endif %}
</script>

</body>
</html>
