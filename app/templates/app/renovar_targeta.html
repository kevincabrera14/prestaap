{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Renovar Préstamo | {{ targeta.nombre_cliente }}</title>
    <!-- Relación con el archivo de icono -->
    <link rel="icon" type="image/x-icon" href="{% static 'app/img/favicon.ico' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="col-md-6 mx-auto">
        <div class="card shadow border-0 rounded-4">
            <div class="card-body p-4">
                <h3 class="fw-bold text-primary mb-4">🔄 Renovar Préstamo</h3>
                <p class="text-muted">Cliente: <strong>{{ targeta.nombre_cliente }}</strong></p>
                
                <div class="alert alert-info py-2">
                    Deuda pendiente actual: <strong>${{ saldo_pendiente }}</strong>
                </div>

                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nuevo Monto a Prestar</label>
                        <input type="number" name="monto_base" class="form-control form-control-lg" value="{{ targeta.monto_base }}" required>
                        <small class="text-muted">Se descontará la deuda anterior automáticamente.</small>
                    </div>

                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label fw-bold">Interés (%)</label>
                            <input type="number" name="tasa_interes" class="form-control" value="{{ targeta.tasa_interes }}" required>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label fw-bold">Plazo (Días)</label>
                            <input type="number" name="plazo_dias" class="form-control" value="{{ targeta.plazo_dias }}" required>
                        </div>
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary btn-lg shadow">Confirmar Renovación</button>
                        <a href="javascript:history.back()" class="btn btn-link text-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
