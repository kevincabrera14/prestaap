{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Renovar Préstamo | {{ targeta.nombre_cliente }}</title>
    <link rel="shortcut icon" type="image/x-icon" href="{% static 'img/favicon.ico' %}">
    <link rel="icon" type="image/png" href="{% static 'img/favicon.ico' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<nav class="top-nav">
    <a href="javascript:history.back()" class="nav-back">← Volver</a>
    <span class="nav-title">Renovar Préstamo</span>
    <div style="width: 70px;"></div>
</nav>

<div class="renovar-wrap">
    <div class="renovar-card">

        <div class="renovar-header">
            <h3>🔄 {{ targeta.nombre_cliente }}</h3>
            <p>Renovación de crédito</p>
        </div>

        <div class="renovar-body">

            <div class="renovar-alert">
                Deuda pendiente actual: <strong>${{ saldo_pendiente }}</strong>
                — se descontará automáticamente.
            </div>

            <form method="POST">
                {% csrf_token %}

                <div class="field-wrap">
                    <label class="field-label">Nuevo monto a prestar</label>
                    <div class="monto-wrap">
                        <span class="monto-prefix ingreso">$</span>
                        <input type="number" name="monto_base" class="monto-input"
                               value="{{ targeta.monto_base }}" required>
                    </div>
                </div>

                <div class="renovar-row">
                    <div class="field-wrap">
                        <label class="field-label">Interés (%)</label>
                        <div class="monto-wrap">
                            <input type="number" name="tasa_interes" class="monto-input"
                                   value="{{ targeta.tasa_interes }}" required min="0">
                        </div>
                    </div>
                    <div class="field-wrap">
                        <label class="field-label">Plazo (días)</label>
                        <div class="monto-wrap">
                            <input type="number" name="plazo_dias" class="monto-input"
                                   value="{{ targeta.plazo_dias }}" required>
                        </div>
                    </div>
                </div>

                <div class="divider"></div>

                <button type="submit" class="btn-renovar-confirm">✅ Confirmar Renovación</button>
                <a href="javascript:history.back()" class="btn-volver">Cancelar</a>
            </form>

        </div>
    </div>
</div>

</body>
</html>
