{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Abonos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" type="image/x-icon" href="{% static 'img/favicon.ico' %}">
    <link rel="icon" type="image/png" href="{% static 'img/favicon.ico' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="bg-light">

<div class="container mt-4">
    <h4>Abonos – {{ targeta.nombre_cliente }}</h4>

    <a href="{% url 'crear_abono' targeta.id %}" class="btn btn-success btn-sm mb-3">
        + Registrar Abono
    </a>

    <table class="table table-bordered">
        <thead class="table-light">
            <tr>
                <th>Fecha</th>
                <th>Monto</th>
                <th>Registrado por</th>
            </tr>
        </thead>
        <tbody>
        {% for abono in abonos %}
            <tr>
                <td>{{ abono.fecha }}</td>
                <td>${{ abono.monto }}</td>
                <td>{{ abono.registrado_por.username }}</td>
            </tr>
        {% empty %}
            <tr>
                <td colspan="3" class="text-center">No hay abonos registrados</td>
            </tr>
        {% endfor %}
        </tbody>
    </table>

    <a href="{% url 'dashboard_supervisor' %}" class="btn btn-secondary btn-sm">Volver</a>
</div>

</body>
</html>
