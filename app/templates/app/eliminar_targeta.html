{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Eliminar Targeta</title>
 <!-- Cargar el favicon usando la ruta que me diste -->
    <link rel="shortcut icon" type="image/x-icon" href="{% static 'img/favicon.ico' %}">
    
    <!-- Opcional: para asegurar compatibilidad con móviles -->
    <link rel="icon" type="image/png" href="{% static 'img/favicon.ico' %}">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
<div class="alert alert-danger">
    <h5>¿Eliminar targeta?</h5>
    <p>{{ targeta.nombre_cliente }}</p>

    <form method="post">
        {% csrf_token %}
        <a href="{% url 'dashboard_supervisor' %}" class="btn btn-secondary">Cancelar</a>
        <button class="btn btn-danger">Eliminar</button>
    </form>
</div>
</div>

</body>
</html>
