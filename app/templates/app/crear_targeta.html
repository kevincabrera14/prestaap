{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PrestApp | Crear Targeta</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Relación con el archivo de icono -->
    <link rel="icon" type="image/x-icon" href="{% static 'app/img/favicon.ico' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; color: #333; }
        .form-card { background: white; border-radius: 20px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .section-title { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #0d6efd; border-bottom: 2px solid #e9ecef; padding-bottom: 10px; margin-bottom: 20px; }
        .form-label { font-weight: 600; font-size: 0.9rem; color: #495057; }
        .btn-save { border-radius: 12px; padding: 0.8rem 2rem; font-weight: 700; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
            
            <div class="d-flex align-items-center mb-4">
                <a href="{% url 'dashboard_supervisor' %}" class="btn btn-light rounded-circle me-3 shadow-sm">
                    ←
                </a>
                <h3 class="fw-bold m-0">Nueva Targeta de Préstamo</h3>
            </div>


            <div class="card form-card">
                <div class="card-body p-4 p-md-5">
                    <form method="post">
                        {% csrf_token %}

                        <div class="section-title">📍 Ubicación de Ruta</div>
                        <div class="mb-4">
                            <label class="form-label">Ruta Asignada</label>
                            <select name="ruta" class="form-select" required>
                                <option value="">Seleccione ruta</option>
                                {% for r in rutas %}
                                    <option value="{{ r.id }}" {% if request.GET.ruta|add:"0" == r.id %}selected{% endif %}>
                                        {{ r.nombre }} (Saldo: ${{ r.base }})
                                    </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="section-title">👤 Información del Cliente</div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Tipo de identificación</label>
                                <select name="tipo_identificacion" class="form-select" required>
                                    <option value="CC">Cédula</option>
                                    <option value="CE">Cédula Extranjera</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Número identificación</label>
                                <input type="text" name="numero_identificacion" class="form-control" required>
                            </div>
                            <div class="col-12 mb-3">
                                <label class="form-label">Nombre completo del cliente</label>
                                <input type="text" name="nombre_cliente" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Teléfono</label>
                                <input type="text" name="telefono" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Dirección casa</label>
                                <input type="text" name="direccion_casa" class="form-control" required>
                            </div>
                            <div class="col-12 mb-3">
                                <label class="form-label">Dirección negocio (opcional)</label>
                                <input type="text" name="direccion_negocio" class="form-control">
                            </div>
                            <div class="col-12 mb-4">
                                <label class="form-label">Observaciones</label>
                                <textarea name="observaciones" class="form-control" rows="2"></textarea>
                            </div>
                        </div>

                        <div class="section-title">💵 Condiciones del Préstamo</div>
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Monto Base</label>
                                <input type="number" name="monto_base" class="form-control" required min="1">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Tasa Interés (%)</label>
                                <input type="number" name="tasa_interes" class="form-control" required min="1">
                            </div>
                            <div class="col-md-4 mb-4">
                                <label class="form-label">Plazo (Días)</label>
                                <input type="number" name="plazo_dias" class="form-control" required min="1">
                            </div>
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                            <a href="{% url 'dashboard_supervisor' %}" class="btn btn-light btn-save text-muted me-md-2">Cancelar</a>
                            <button type="submit" class="btn btn-success btn-save shadow">
                                ✅ Crear Targeta
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
