{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>PrestApp | Crear Tarjeta</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" type="image/x-icon" href="{% static 'img/favicon.ico' %}">
    <link rel="icon" type="image/png" href="{% static 'img/favicon.ico' %}">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body class="bg-light">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-8">

                <div class="d-flex align-items-center mb-4">
                    <a href="{% url 'dashboard_supervisor' %}" class="btn btn-white rounded-circle me-3 shadow-sm border">
                        <i class="bi bi-arrow-left"></i>
                    </a>
                    <h3 class="fw-bold m-0">Nueva Tarjeta de Préstamo</h3>
                </div>

                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4 p-md-5">
                        <form method="post">
                            {% csrf_token %}

                            <div class="section-title mb-3 fw-bold text-primary">📍 Ubicación de Ruta</div>
                            <div class="mb-4">
                                <label class="form-label">Ruta Asignada</label>
                                <select name="ruta" class="form-select shadow-sm" required>
                                    <option value="">Seleccione ruta</option>
                                    {% for r in rutas %}
                                    <option value="{{ r.id }}" {% if request.GET.ruta|add:"0" == r.id %}selected{% endif %}>
                                        {{ r.nombre }} (Saldo: ${{ r.base }})
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="section-title mb-3 fw-bold text-primary">👤 Información del Cliente</div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Tipo de identificación</label>
                                    <select name="tipo_identificacion" class="form-select shadow-sm" required>
                                        <option value="CC">Cédula de Ciudadanía</option>
                                        <option value="CE">Cédula Extranjera</option>
                                        <option value="TI">Tarjeta de Identidad</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Número identificación</label>
                                    <input type="text" name="numero_identificacion" class="form-control shadow-sm" placeholder="Ej: 10203040" required>
                                </div>
                                <div class="col-12 mb-3">
                                    <label class="form-label">Nombre completo del cliente</label>
                                    <input type="text" name="nombre_cliente" class="form-control shadow-sm" placeholder="Nombre y Apellidos" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Teléfono</label>
                                    <input type="text" name="telefono" class="form-control shadow-sm" placeholder="Ej: 3001234567" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Dirección casa</label>
                                    <input type="text" name="direccion_casa" class="form-control shadow-sm" placeholder="Calle, Carrera, Barrio" required>
                                </div>
                                <div class="col-12 mb-3">
                                    <label class="form-label">Dirección negocio (opcional)</label>
                                    <input type="text" name="direccion_negocio" class="form-control shadow-sm" placeholder="Nombre del local o dirección">
                                </div>
                                <div class="col-12 mb-4">
                                    <label class="form-label">Observaciones</label>
                                    <textarea name="observaciones" class="form-control shadow-sm" rows="2" placeholder="Detalles adicionales..."></textarea>
                                </div>
                            </div>

                            <div class="section-title mb-3 fw-bold text-primary">💵 Condiciones del Préstamo</div>
                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">Frecuencia de cobro</label>
                                    <select name="frecuencia_cobro" class="form-select shadow-sm" required>
                                        <option value="DIARIO" selected>📅 Diario</option>
                                        <option value="SEMANAL">📆 Semanal</option>
                                        <option value="QUINCENAL">🗓️ Quincenal</option>
                                        <option value="MENSUAL">🗓️ Mensual</option>
                                    </select>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">Monto Base</label>
                                    <div class="input-group shadow-sm">
                                        <span class="input-group-text">$</span>
                                        <input type="number" name="monto_base" class="form-control" required min="1" placeholder="0">
                                    </div>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">Tasa Interés (%)</label>
                                    <input type="number" name="tasa_interes" class="form-control shadow-sm" required min="1" placeholder="Ej: 20">
                                </div>
                                <div class="col-md-4 mb-4">
                                    <label class="form-label">Plazo (Días)</label>
                                    <input type="number" name="plazo_dias" class="form-control shadow-sm" required min="1" placeholder="Ej: 30">
                                </div>
                            </div>

                            <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                                <a href="{% url 'dashboard_supervisor' %}" class="btn btn-light px-4 border">Cancelar</a>
                                <button type="submit" class="btn btn-success px-4 shadow">
                                    <i class="bi bi-check-circle me-1"></i> Crear Tarjeta
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
