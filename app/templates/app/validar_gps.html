<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmar Ubicación | PrestApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Inter', sans-serif; }
        .card { border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn-gps { background: #ffc107; border: none; font-weight: 700; padding: 15px; border-radius: 12px; transition: 0.3s; }
        .btn-gps:hover { background: #e0a800; transform: translateY(-2px); }
    </style>
</head>
<body class="d-flex align-items-center vh-100">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-11 col-md-5 text-center">
                <div class="card p-4">
                    <div class="display-4 mb-3">📍</div>
                    <h3 class="fw-bold">¡Hola, {{ targeta.nombre_cliente }}!</h3>
                    <p class="text-muted">Para finalizar tu registro, por favor confirma tu ubicación de cobro presionando el botón de abajo.</p>
                    
                    <button id="btnEnviar" onclick="obtenerUbicacion()" class="btn btn-gps w-100 mb-3 shadow">
                        CONFIRMAR MI UBICACIÓN
                    </button>

                    <div id="exito" class="alert alert-success d-none">
                        ✅ ¡Ubicación guardada! Ya puedes cerrar esta ventana.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function obtenerUbicacion() {
            const btn = document.getElementById('btnEnviar');
            btn.disabled = true;
            btn.innerText = "Procesando...";

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;

                    const formData = new FormData();
                    formData.append('latitud', lat);
                    formData.append('longitud', lng);
                    formData.append('csrfmiddlewaretoken', '{{ csrf_token }}');

                    fetch('', {
                        method: 'POST',
                        body: formData
                    })
                    .then(response => response.json())
                    .then(data => {
                        if(data.status === 'ok') {
                            btn.classList.add('d-none');
                            document.getElementById('exito').classList.remove('d-none');
                        }
                    });
                }, function(error) {
                    alert("Error: Debes permitir el acceso al GPS para continuar.");
                    btn.disabled = false;
                    btn.innerText = "CONFIRMAR MI UBICACIÓN";
                });
            } else {
                alert("Tu navegador no soporta GPS.");
            }
        }
    </script>
</body>
</html>
