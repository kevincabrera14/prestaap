{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Ruta</title>
    <!-- Relación con el archivo de icono -->
    <link rel="icon" type="image/x-icon" href="{% static 'app/img/favicon.ico' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">PrestApp | Editar Ruta</span>
    <a href="{% url 'dashboard_supervisor' %}" class="btn btn-outline-light btn-sm">← Volver</a>
</nav>

<div class="container mt-4">
    <div class="card shadow-sm">
        <div class="card-body">
            <h5 class="mb-3">Editar Ruta</h5>

            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input type="text" name="nombre"
                           value="{{ ruta.nombre }}"
                           class="form-control" required>
                </div>

                <button class="btn btn-success">Guardar cambios</button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
