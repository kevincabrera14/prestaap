{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Eliminar Ruta</title><!-- Relación con el archivo de icono -->
    <link rel="icon" type="image/x-icon" href="{% static 'app/img/favicon.ico' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="alert alert-danger shadow-sm">
        <h5>¿Eliminar ruta?</h5>
        <p>Ruta: <strong>{{ ruta.nombre }}</strong></p>

        <form method="post">
            {% csrf_token %}
            <a href="{% url 'dashboard_supervisor' %}" class="btn btn-secondary">Cancelar</a>
            <button class="btn btn-danger">Eliminar</button>
        </form>
    </div>
</div>

</body>
</html>
