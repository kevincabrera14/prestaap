{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Gasto | {{ ruta.nombre }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow border-0">
                    <div class="card-header bg-danger text-white fw-bold text-center">
                        💸 Registrar Gasto - {{ ruta.nombre }}
                    </div>
                    <div class="card-body p-4">
                        <form method="POST">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label fw-bold">Monto del Gasto</label>
                                <input type="number" name="monto" class="form-control form-control-lg" placeholder="0.00" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Descripción / Motivo</label>
                                <textarea name="descripcion" class="form-control" rows="3" placeholder="Ej: Gasolina Moto, Almuerzo, Urgencia..."></textarea>
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-danger btn-lg shadow-sm">Guardar Gasto</button>
                                <a href="{% url 'dashboard_supervisor' %}?ruta={{ ruta.id }}" class="btn btn-light text-muted">Cancelar</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
